<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>CommuniVerse | Settings</title>
  <link rel="manifest" href="manifest.json">
  <meta name="theme-color" content="#8b5cf6">
  <link rel="apple-touch-icon" href="images/icon.png">
  <link rel="stylesheet" href="css/style.css">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
  <style>
    .settings-header {
      padding: 16px; display: flex; align-items: center; gap: 16px;
      border-bottom: 1px solid var(--glass-border);
    }
    .profile-photo-container {
      position: relative; width: 120px; height: 120px; margin: 30px auto;
    }
    .profile-photo {
      width: 100%; height: 100%; border-radius: 50%;
      object-fit: cover; border: 3px solid var(--primary-color);
    }
    .photo-edit-btn {
      position: absolute; bottom: 0; right: 0;
      background: var(--primary-color); border: none; color: white;
      width: 36px; height: 36px; border-radius: 50%;
      cursor: pointer; display: flex; justify-content: center; align-items: center;
      box-shadow: 0 4px 10px rgba(0,0,0,0.3);
    }
  </style>
</head>
<body>
  <div class="app-container">
    <div class="settings-header">
      <h2 style="margin: 0; flex: 1; text-align: center;">Profile & Settings</h2>
    </div>

    <div style="padding: 20px;">
      <div class="profile-photo-container">
        <img src="" id="profileImg" class="profile-photo">
        <button class="photo-edit-btn" onclick="document.getElementById('photoInput').click()">
          <i class="fa-solid fa-camera"></i>
        </button>
        <input type="file" id="photoInput" hidden accept="image/*">
      </div>
      
      <p id="uploadStatus" class="text-center mb-20" style="color: var(--accent-color); font-size: 14px;"></p>

      <div class="input-group">
        <label>Username (Non-editable)</label>
        <input type="text" id="usernameInput" class="input-glass" disabled style="opacity: 0.7;">
      </div>

      <div class="input-group">
        <label>Display Name</label>
        <input type="text" id="nameInput" class="input-glass" placeholder="Your full name">
      </div>

      <div class="input-group">
        <label>Status (Like WhatsApp)</label>
        <input type="text" id="statusInput" class="input-glass" placeholder="Hey there! I am using CommuniVerse">
      </div>

      <div class="input-group">
        <label>Bio ✍️</label>
        <textarea id="bioInput" class="input-glass" style="height: 100px; resize: none;" placeholder="Tell the universe about yourself..."></textarea>
      </div>

      <div class="input-group">
        <label><i class="fa-brands fa-instagram"></i> Instagram Link</label>
        <input type="text" id="igLinkInput" class="input-glass" placeholder="https://instagram.com/username">
      </div>

      <div class="input-group">
        <label><i class="fa-brands fa-x-twitter"></i> X (Twitter) Link</label>
        <input type="text" id="twLinkInput" class="input-glass" placeholder="https://twitter.com/username">
      </div>

      <button class="btn-primary" id="saveBtn" style="margin-top: 10px;">
        <i class="fa-solid fa-floppy-disk"></i> Save Profile
      </button>
      
      <p id="saveMsg" class="text-center mt-20" style="color: var(--success-color);"></p>

      <div style="margin-top: 40px; border-top: 1px solid var(--glass-border); padding-top: 20px;">
        <h3 style="font-size: 16px; margin-bottom: 20px;">Help & Legal</h3>
        <div style="display: flex; flex-direction: column; gap: 12px;">
            <div class="glass-panel" style="padding: 12px 20px; cursor: pointer; display: flex; align-items: center; justify-content: space-between;" onclick="window.location.href='support.html'">
                <span><i class="fa-solid fa-circle-question" style="margin-right: 12px; color: var(--primary-color);"></i> Support Centre</span>
                <i class="fa-solid fa-chevron-right" style="opacity: 0.5;"></i>
            </div>
            <div class="glass-panel" style="padding: 12px 20px; cursor: pointer; display: flex; align-items: center; justify-content: space-between;" onclick="window.location.href='contact.html'">
                <span><i class="fa-solid fa-envelope" style="margin-right: 12px; color: var(--primary-color);"></i> Contact Us</span>
                <i class="fa-solid fa-chevron-right" style="opacity: 0.5;"></i>
            </div>
            <div class="glass-panel" style="padding: 12px 20px; cursor: pointer; display: flex; align-items: center; justify-content: space-between;" onclick="window.location.href='terms.html'">
                <span><i class="fa-solid fa-file-contract" style="margin-right: 12px; color: var(--primary-color);"></i> Terms & Conditions</span>
                <i class="fa-solid fa-chevron-right" style="opacity: 0.5;"></i>
            </div>
            <div class="glass-panel" style="padding: 12px 20px; cursor: pointer; display: flex; align-items: center; justify-content: space-between;" onclick="window.location.href='privacy.html'">
                <span><i class="fa-solid fa-shield-halved" style="margin-right: 12px; color: var(--primary-color);"></i> Privacy Policy</span>
                <i class="fa-solid fa-chevron-right" style="opacity: 0.5;"></i>
            </div>
        </div>
      </div>

      <div class="input-group" style="margin-top: 40px; border-top: 1px solid var(--glass-border); padding-top: 20px;">
        <label>Notifications</label>
        <div style="display:flex; gap:10px; flex-wrap:wrap; align-items:center;">
          <button class="btn-primary" id="enableNotifBtn"><i class="fa-solid fa-bell"></i> Enable Notifications</button>
          <button class="btn-secondary" id="testNotifBtn"><i class="fa-solid fa-paper-plane"></i> Send Test Notification</button>
        </div>
        <p id="notificationStatus" class="text-center mt-10" style="color: var(--text-secondary); font-size: 14px;"></p>
      </div>
    </div>

    <!-- Bottom Navigation -->
    <div class="bottom-nav">
      <div class="nav-item" onclick="window.location.href='feed.html'"><i class="fa-solid fa-house"></i></div>
      <div class="nav-item" onclick="window.location.href='search.html'"><i class="fa-solid fa-magnifying-glass"></i></div>
      <div class="nav-item" onclick="window.location.href='create-post.html'"><i class="fa-solid fa-square-plus"></i></div>
      <div class="nav-item" onclick="window.location.href='home.html'"><i class="fa-brands fa-facebook-messenger"></i></div>
      <div class="nav-item active" onclick="window.location.href='settings.html'"><i class="fa-solid fa-user"></i></div>
    </div>
  </div>

  <script type="module">
    import { auth, db, storage, onAuthStateChanged, doc, getDoc, updateDoc, ref, uploadBytesResumable, getDownloadURL } from './js/firebase.js';
    import { registerPushNotifications, postNotificationToUser, listenForNotifications, setupForegroundMessaging } from './js/notifications.js';

    const profileImg = document.getElementById('profileImg');
    const photoInput = document.getElementById('photoInput');
    let currentUser = null;
    const usernameInput = document.getElementById('usernameInput');
    const nameInput = document.getElementById('nameInput');
    const saveBtn = document.getElementById('saveBtn');
    const uploadStatus = document.getElementById('uploadStatus');
    const statusInput = document.getElementById('statusInput');
    const bioInput = document.getElementById('bioInput');
    const igLinkInput = document.getElementById('igLinkInput');
    const twLinkInput = document.getElementById('twLinkInput');

    onAuthStateChanged(auth, async (user) => {
      if (user) {
        currentUser = user;
        const userSnap = await getDoc(doc(db, "users", user.uid));
        if (userSnap.exists()) {
          const data = userSnap.data();
          profileImg.src = data.photoURL;
          usernameInput.value = data.username;
          nameInput.value = data.name || "";
          statusInput.value = data.status || "";
          bioInput.value = data.bio || "";
          igLinkInput.value = data.igLink || "";
          twLinkInput.value = data.twLink || "";
        }
        listenForNotifications();
        setupForegroundMessaging();
      } else {
        window.location.href = "index.html";
      }
    });

    photoInput.addEventListener('change', async (e) => {
      const file = e.target.files[0];
      if (!file) return;

      const storageRef = ref(storage, `profile_photos/${currentUser.uid}/${file.name}`);
      const uploadTask = uploadBytesResumable(storageRef, file);

      uploadStatus.innerText = "Uploading photo...";
      uploadTask.on('state_changed', null, 
        (error) => uploadStatus.innerText = "Error: " + error.message,
        async () => {
          const downloadURL = await getDownloadURL(uploadTask.snapshot.ref);
          profileImg.src = downloadURL;
          await updateDoc(doc(db, "users", currentUser.uid), { photoURL: downloadURL });
          uploadStatus.innerText = "Photo updated successfully!";
          setTimeout(() => uploadStatus.innerText = "", 3000);
        }
      );
    });

    saveBtn.addEventListener('click', async () => {
      const user = auth.currentUser;
      if (!user) {
        saveMsg.innerText = "You must be signed in.";
        return;
      }
      
      const newName = nameInput.value.trim();
      const status = statusInput.value.trim();
      const bio = bioInput.value.trim();
      const igLink = igLinkInput.value.trim();
      const twLink = twLinkInput.value.trim();

      saveBtn.innerHTML = '<span class="loader"></span>';
      
      try {
        await updateDoc(doc(db, "users", user.uid), {
          name: newName,
          status,
          bio,
          igLink,
          twLink
        });
        saveMsg.innerText = "Profile saved successfully!";
        saveMsg.style.color = "var(--success-color)";
      } catch (err) {
        saveMsg.innerText = "Error saving profile.";
        saveMsg.style.color = "var(--danger-color)";
      }
      
      saveBtn.innerHTML = '<i class="fa-solid fa-floppy-disk"></i> Save Profile';
      setTimeout(() => saveMsg.innerText = "", 3000);
    });

    const enableNotifBtn = document.getElementById('enableNotifBtn');
    const testNotifBtn = document.getElementById('testNotifBtn');
    const notificationStatus = document.getElementById('notificationStatus');

    enableNotifBtn.addEventListener('click', async () => {
      if (!currentUser) return;
      enableNotifBtn.innerHTML = '<span class="loader"></span>';
      try {
        const token = await registerPushNotifications();
        notificationStatus.innerText = token
          ? "Notifications enabled and FCM token saved."
          : "Notification permission denied.";
      } catch (err) {
        notificationStatus.innerText = err.message;
      } finally {
        enableNotifBtn.innerHTML = '<i class="fa-solid fa-bell"></i> Enable Notifications';
      }
    });

    testNotifBtn.addEventListener('click', async () => {
      if (!currentUser) return;
      testNotifBtn.innerHTML = '<span class="loader"></span>';
      try {
        await postNotificationToUser(currentUser.uid, 'CommuniVerse Test', 'This is a test notification from your app.');
        notificationStatus.innerText = "Test notification posted to your account.";
      } catch (err) {
        notificationStatus.innerText = err.message;
      } finally {
        testNotifBtn.innerHTML = '<i class="fa-solid fa-paper-plane"></i> Send Test Notification';
      }
    });
  </script>
  <script>
  if ('serviceWorker' in navigator) {
    window.addEventListener('load', () => {
      navigator.serviceWorker.register('firebase-messaging-sw.js').catch(console.error);
    });
  }
  </script>
</body>
</html>
