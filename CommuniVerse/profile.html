<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>CommuniVerse | Profile</title>
  <link rel="stylesheet" href="css/style.css">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
  <style>
    .profile-hero { padding: 40px 20px; text-align: center; background: rgba(255,255,255,0.2); border-bottom: 1px solid var(--glass-border); }
    .profile-avatar { width: 120px; height: 120px; border-radius: 50%; border: 4px solid var(--primary-color); object-fit: cover; margin-bottom: 16px; }
    .profile-name { font-size: 24px; font-weight: 700; color: var(--text-primary); }
    .profile-username { color: var(--text-secondary); font-size: 16px; margin-bottom: 8px; }
    .profile-status { font-style: italic; color: var(--accent-color); font-size: 14px; margin-bottom: 20px; }
    
    .profile-bio { padding: 20px; line-height: 1.6; color: var(--text-primary); text-align: center; }
    
    .social-links { display: flex; justify-content: center; gap: 20px; margin: 20px 0; font-size: 24px; }
    .social-links a { color: var(--primary-color); transition: var(--transition); }
    .social-links a:hover { transform: scale(1.2); color: var(--secondary-color); }
    
    .profile-actions { display: flex; justify-content: center; gap: 12px; padding: 20px; }
    .btn-action { padding: 12px 24px; border-radius: 24px; border: none; font-weight: 600; cursor: pointer; display: flex; align-items: center; gap: 8px; transition: var(--transition); }
    .btn-message { background: var(--primary-color); color: white; }
    .btn-friend { background: var(--glass-bg); color: var(--text-primary); border: 1px solid var(--glass-border); }
  </style>
</head>
<body>
  <div class="app-container">
    <div class="header">
      <button class="btn-icon" onclick="history.back()"><i class="fa-solid fa-arrow-left"></i></button>
      <h2 class="gradient-text" style="flex: 1; text-align: center;">Profile</h2>
    </div>

    <div id="profileContent">
      <div style="text-align: center; padding: 60px;">
        <span class="loader"></span>
      </div>
    </div>


    <!-- Bottom Navigation -->
    <div class="bottom-nav">
      <div class="nav-item" onclick="window.location.href='feed.html'"><i class="fa-solid fa-house"></i></div>
      <div class="nav-item" onclick="window.location.href='search.html'"><i class="fa-solid fa-magnifying-glass"></i></div>
      <div class="nav-item" onclick="window.location.href='create-post.html'"><i class="fa-solid fa-square-plus"></i></div>
      <div class="nav-item" onclick="window.location.href='home.html'"><i class="fa-brands fa-facebook-messenger"></i></div>
      <div class="nav-item active" onclick="window.location.href='settings.html'"><i class="fa-solid fa-user"></i></div>
    </div>
  </div>

  <script type="module">
    import { auth, db, onAuthStateChanged, doc, getDoc, updateDoc, arrayUnion, arrayRemove } from './js/firebase.js';
    navigator.serviceWorker.register('firebase-messaging-sw.js').catch(console.error);
    
    const urlParams = new URLSearchParams(window.location.search);
    const targetUid = urlParams.get('uid');
    
    const profileContent = document.getElementById('profileContent');
    
    onAuthStateChanged(auth, async (user) => {
      if (!user) window.location.href = 'index.html';
      if (!targetUid) window.location.href = 'feed.html';
      
      const targetSnap = await getDoc(doc(db, "users", targetUid));
      if (!targetSnap.exists()) {
        profileContent.innerHTML = '<p class="text-center mt-20">User not found.</p>';
        return;
      }
      
      const data = targetSnap.data();
      const meSnap = await getDoc(doc(db, "users", user.uid));
      const myData = meSnap.data();
      
      const isFriend = myData.friends && myData.friends.includes(targetUid);
      
      // Calculate Badges
      let badgesHtml = '';
      if (data.streak >= 3) badgesHtml += `<div class="badge-item" title="Streak"><i class="fa-solid fa-fire" style="color:#f97316"></i> ${data.streak}</div>`;
      if (data.createdAt && (new Date() - data.createdAt.toDate()) > 2592000000) { // > 30 days
        badgesHtml += `<div class="badge-item" title="Veteran"><i class="fa-solid fa-award" style="color:#fbbf24"></i> Veteran</div>`;
      }
      if (data.messagesSent > 100) badgesHtml += `<div class="badge-item" title="Active Chatty"><i class="fa-solid fa-comments" style="color:#3b82f6"></i> Talkative</div>`;

      profileContent.innerHTML = `
        <div class="profile-hero">
          <img src="${data.photoURL}" class="profile-avatar">
          <div class="profile-name">${data.name}</div>
          <div class="profile-username">${data.username}</div>
          <div class="profile-status">${data.status || 'No status yet'}</div>
          <div style="display:flex; justify-content:center; gap:8px; margin-top:10px;">${badgesHtml}</div>
        </div>
        
        <div class="profile-bio">
          ${data.bio || 'This user hasn’t shared a bio yet.'}
        </div>
        
        <div class="social-links">
          ${data.igLink ? `<a href="${data.igLink}" target="_blank"><i class="fa-brands fa-instagram"></i></a>` : ''}
          ${data.twLink ? `<a href="${data.twLink}" target="_blank"><i class="fa-brands fa-x-twitter"></i></a>` : ''}
        </div>
        
        <div class="profile-actions">
          <button class="btn-action btn-message" onclick="window.location.href='chat.html?uid=${targetUid}'">
            <i class="fa-solid fa-paper-plane"></i> Message
          </button>
          <button class="btn-action btn-friend" id="friendBtn">
            <i class="fa-solid ${isFriend ? 'fa-user-minus' : 'fa-user-plus'}"></i> 
            ${isFriend ? 'Remove Friend' : 'Add Friend'}
          </button>
        </div>
      `;
      
      const friendBtn = document.getElementById('friendBtn');
      friendBtn.addEventListener('click', async () => {
        try {
          const myRef = doc(db, "users", user.uid);
          const targetRef = doc(db, "users", targetUid);
          
          if (myData.friends && myData.friends.includes(targetUid)) {
             await updateDoc(myRef, { friends: arrayRemove(targetUid) });
             await updateDoc(targetRef, { friends: arrayRemove(user.uid) });
             alert("Removed from friends.");
          } else {
             await updateDoc(myRef, { friends: arrayUnion(targetUid) });
             await updateDoc(targetRef, { friends: arrayUnion(user.uid) });
             alert("Added to friends!");
          }
          window.location.reload();
        } catch (e) { alert(e.message); }
      });
    });
  </script>
</body>
</html>
