<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>CommuniVerse | Chat</title>
  <link rel="shortcut icon" href="images/icon.png" type="image/x-icon">
  <link rel="manifest" href="manifest.json">
  <meta name="theme-color" content="#8b5cf6">
  <link rel="apple-touch-icon" href="images/icon.png">
  <link rel="stylesheet" href="css/style.css">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
  <style>
    .chat-header {
      padding: 16px;
      display: flex; align-items: center; justify-content: space-between;
      background: rgba(255, 255, 255, 0.9); backdrop-filter: blur(10px);
      border-bottom: 1px solid var(--glass-border);
      position: sticky; top: 0; z-index: 10;
    }
    .messages-container {
      flex: 1; padding: 20px; overflow-y: auto; display: flex; flex-direction: column; gap: 12px;
    }
    .message {
      max-width: 75%; padding: 12px 16px; border-radius: 20px;
      font-size: 15px; line-height: 1.4; position: relative;
    }
    @media (min-width: 768px) {
      .message { max-width: 50%; }
    }
    .msg-sent {
      align-self: flex-end;
      background: linear-gradient(135deg, var(--primary-color), var(--secondary-color));
      border-bottom-right-radius: 4px; color: #fff;
    }
    .msg-received {
      align-self: flex-start;
      background: var(--glass-bg); border: 1px solid var(--glass-border);
      border-bottom-left-radius: 4px; color: var(--text-primary);
    }
    .msg-time { font-size: 10px; opacity: 0.8; margin-top: 4px; display: block; text-align: right; }
    .msg-status { display: block; font-size: 10px; opacity: 0.75; margin-top: 4px; text-align: right; }
    
    .chat-input-container {
      padding: 16px; background: rgba(255, 255, 255, 0.9);
      border-top: 1px solid var(--glass-border); display: flex; align-items: center; gap: 12px;
      position: sticky; bottom: 0;
    }
    .chat-input {
      flex: 1; background: var(--glass-bg); border: 1px solid var(--glass-border);
      padding: 12px 20px; border-radius: 24px; color: var(--text-primary); outline: none;
    }
    .chat-input:focus { border-color: var(--primary-color); }
    
    .msg-img { max-width: 100%; border-radius: 12px; margin-bottom: 8px; cursor: pointer; }
    
    .typing-indicator {
      align-self: flex-start; padding: 8px 16px; border-radius: 20px;
      background: var(--glass-bg); display: none; color: var(--text-secondary);
      font-size: 12px; font-style: italic; margin-left: 20px; margin-bottom: 10px; width: fit-content;
    }
    .typing-dots span {
      display: inline-block; width: 4px; height: 4px; border-radius: 50%;
      background: var(--text-secondary); animation: blink 1.4s infinite reverse; margin: 0 2px;
    }
    .typing-dots span:nth-child(2) { animation-delay: 0.2s; }
    .typing-dots span:nth-child(3) { animation-delay: 0.4s; }
    @keyframes blink { 0% { opacity: 0.2; } 50% { opacity: 1; } 100% { opacity: 0.2; } }
  </style>
</head>
<body>
  <div class="app-container">
    <div class="chat-header">
      <div style="display: flex; align-items: center; gap: 12px;">
        <button class="btn-icon" onclick="window.location.href='home.html'"><i class="fa-solid fa-arrow-left"></i></button>
        <img src="" id="chatAvatar" class="avatar avatar-md hidden">
        <div>
          <div id="chatName" style="font-weight: 600; font-size: 16px;">Loading...</div>
          <div id="chatStatus" style="font-size: 12px; color: var(--text-secondary);">Connecting...</div>
        </div>
      </div>
      <div>
        <button class="btn-icon" id="voiceCallBtn"><i class="fa-solid fa-phone"></i></button>
        <button class="btn-icon" id="videoCallBtn"><i class="fa-solid fa-video"></i></button>
      </div>
    </div>

    <div class="messages-container" id="messagesContainer">
      <div style="text-align: center; margin-top: 50%;">
        <span class="loader"></span>
      </div>
    </div>
    
    <div class="typing-indicator" id="typingIndicator">
      Typing <span class="typing-dots"><span></span><span></span><span></span></span>
    </div>

    <div class="chat-input-container" style="flex-wrap: wrap;">
      <input type="file" id="fileInput" hidden accept="image/*,application/pdf,video/*">
      <button class="btn-icon" onclick="document.getElementById('fileInput').click()">
        <i class="fa-solid fa-paperclip"></i>
      </button>
      <div style="display: flex; align-items: center; gap: 4px; padding-right: 8px;">
        <input type="checkbox" id="snapMode" style="accent-color: var(--primary-color);">
        <label for="snapMode" style="font-size: 12px; color: var(--text-secondary);"><i class="fa-solid fa-bolt" style="color: #fbbf24;"></i> Snap</label>
      </div>
      <button class="btn-icon" id="gifBtn">
        <i class="fa-solid fa-face-smile"></i>
      </button>
      <input type="text" id="messageInput" class="chat-input" placeholder="Message...">
      <button class="btn-icon" id="sendBtn" style="background: var(--primary-color); color: white;">
        <i class="fa-solid fa-paper-plane"></i>
      </button>
    </div>
  </div>

  <!-- GIF Search Modal -->
  <div class="static-modal" id="gifModal" style="display: none; flex-direction: column; overflow: hidden; background: rgba(0,0,0,0.9);">
    <div class="header">
      <input type="text" id="gifSearch" class="chat-input" style="flex: 1; margin: 0 10px;" placeholder="Search GIPHY...">
      <button class="btn-icon" onclick="document.getElementById('gifModal').style.display='none'"><i class="fa-solid fa-xmark"></i></button>
    </div>
    <div id="gifResults" style="flex: 1; overflow-y: auto; display: grid; grid-template-columns: 1fr 1fr; gap: 8px; padding: 10px;">
       <!-- GIFs load here -->
    </div>
  </div>

  <!-- Fullscreen Snap Viewer -->
  <div class="static-modal" id="snapViewer" style="background: #000; padding: 0; display: none; z-index: 9999; flex-direction: column;">
    <div style="position: absolute; top: 20px; right: 20px; color: white; z-index: 10;" id="snapTimer">10s</div>
    <div style="flex: 1; display: flex; align-items: center; justify-content: center; position: relative; height: 100vh;">
      <img src="" id="snapImgView" style="max-width: 100%; max-height: 100vh; object-fit: contain;">
      <video src="" id="snapVidView" style="max-width: 100%; max-height: 100vh; object-fit: contain;" playsinline autoplay></video>
    </div>
  </div>

  <script type="module" src="js/chat.js"></script>
  <script>
  if ('serviceWorker' in navigator) {
    window.addEventListener('load', () => {
      navigator.serviceWorker.register('firebase-messaging-sw.js').catch(console.error);
    });
  }
  </script>
</body>
</html>
