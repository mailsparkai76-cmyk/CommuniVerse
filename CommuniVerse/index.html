<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CommuniVerse | Welcome Back</title>
    <link rel="stylesheet" href="css/style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        body {
            margin: 0;
            padding: 0;
            height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            background: linear-gradient(135deg, #a855f7 0%, #ec4899 100%);
            font-family: 'Inter', sans-serif;
            overflow: hidden;
            position: relative;
        }

        /* Ambient spheres */
        .sphere {
            position: absolute;
            border-radius: 50%;
            z-index: 1;
            filter: blur(5px);
        }
        .sphere-1 {
            width: 200px; height: 200px;
            background: linear-gradient(135deg, #3b82f6, #8b5cf6);
            top: 10%; right: 10%;
        }
        .sphere-2 {
            width: 150px; height: 150px;
            background: linear-gradient(135deg, #f59e0b, #ef4444);
            bottom: 20%; left: 15%;
        }
        .sphere-3 {
            width: 300px; height: 300px;
            background: radial-gradient(circle, rgba(255,255,255,0.1) 0%, transparent 100%);
            top: 50%; left: 50%; transform: translate(-50%, -50%);
        }

        .login-card {
            width: 90%;
            max-width: 400px;
            background: rgba(255, 255, 255, 0.15);
            backdrop-filter: blur(25px);
            -webkit-backdrop-filter: blur(25px);
            border-radius: 35px;
            border: 1px solid rgba(255, 255, 255, 0.2);
            padding: 40px;
            box-shadow: 0 20px 50px rgba(0, 0, 0, 0.2);
            z-index: 10;
            text-align: left;
            color: white;
            animation: fadeIn 0.8s ease-out;
        }

        @keyframes fadeIn { from { opacity: 0; transform: translateY(20px); } to { opacity: 1; transform: translateY(0); } }

        .back-btn {
            font-size: 20px;
            color: white;
            cursor: pointer;
            margin-bottom: 30px;
            display: inline-block;
        }

        .communiverse-logo {
            font-size: 14px;
            font-weight: 600;
            letter-spacing: 2px;
            text-transform: uppercase;
            margin-bottom: 10px;
            opacity: 0.8;
            color: white;
        }

        h1 {
            font-size: 32px;
            margin: 0 0 40px 0;
            line-height: 1.2;
            font-weight: 700;
        }

        .input-wrap {
            margin-bottom: 20px;
            position: relative;
        }

        .input-glass {
            width: 100%;
            background: rgba(255, 255, 255, 0.1);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 12px;
            padding: 15px 20px;
            color: white;
            font-size: 15px;
            outline: none;
            box-sizing: border-box;
            transition: 0.3s;
        }

        .input-glass:focus {
            background: rgba(255, 255, 255, 0.15);
            border-color: rgba(255, 255, 255, 0.4);
        }

        .input-glass::placeholder {
            color: rgba(255, 255, 255, 0.5);
        }

        .forgot-pass {
            text-align: right;
            font-size: 12px;
            margin-top: -10px;
            margin-bottom: 30px;
            opacity: 0.7;
            cursor: pointer;
        }

        .login-btn {
            width: 100%;
            padding: 15px;
            border-radius: 15px;
            border: none;
            background: linear-gradient(90deg, #7c3aed 0%, #db2777 100%);
            color: white;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            transition: 0.3s;
            box-shadow: 0 10px 20px rgba(0, 0, 0, 0.15);
        }

        .login-btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 15px 25px rgba(0, 0, 0, 0.25);
        }

        .divider {
            display: flex;
            align-items: center;
            text-align: center;
            margin: 30px 0;
            font-size: 12px;
            opacity: 0.5;
        }

        .divider::before, .divider::after {
            content: '';
            flex: 1;
            border-bottom: 1px solid white;
        }

        .divider:not(:empty)::before { margin-right: 15px; }
        .divider:not(:empty)::after { margin-left: 15px; }

        .social-btns {
            display: flex;
            gap: 20px;
            margin-bottom: 40px;
        }

        .social-btn {
            flex: 1;
            background: rgba(255, 255, 255, 0.1);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 12px;
            height: 50px;
            display: flex;
            align-items: center;
            justify-content: center;
            color: white;
            font-size: 20px;
            cursor: pointer;
            transition: 0.3s;
        }

        .social-btn:hover {
            background: rgba(255, 255, 255, 0.2);
        }

        .signup-text {
            text-align: center;
            font-size: 14px;
            opacity: 0.8;
        }

        .signup-text span {
            font-weight: 700;
            cursor: pointer;
            border-bottom: 2px solid white;
        }

        #authError {
            color: #fca5a5;
            text-align: center;
            font-size: 14px;
            margin-top: 20px;
        }
    </style>
</head>
<body>
    <div class="sphere sphere-1"></div>
    <div class="sphere sphere-2"></div>
    <div class="sphere sphere-3"></div>

    <div class="login-card">
        <div class="back-btn" onclick="window.history.back()"><i class="fa-solid fa-chevron-left"></i></div>
        
        <div style="display: flex; align-items: center; gap: 12px; margin-bottom: 30px;">
            <img src="images/icon.png" alt="CommuniVerse Logo" style="width: 45px; height: 45px; border-radius: 12px; box-shadow: 0 4px 15px rgba(0,0,0,0.3); object-fit: cover;">
            <div class="communiverse-logo" style="margin: 0; font-size: 20px; color: white; font-weight: 700; letter-spacing: 0.5px;">CommuniVerse</div>
        </div>
        
        <h1 id="authTitle">Hello there,<br>Welcome Back</h1>

        <div id="emailSection">
            <div class="input-wrap">
                <input type="email" id="emailInput" class="input-glass" placeholder="Email address">
            </div>
            
            <div class="input-wrap" id="passwordGroup">
                <input type="password" id="passwordInput" class="input-glass" placeholder="Password">
            </div>

            <div class="forgot-pass" id="forgotPassword">Forgot password?</div>

            <button class="login-btn" id="authBtn">Login</button>
        </div>

        <div class="divider">Or Continue with</div>

        <div class="social-btns">
            <div class="social-btn" id="googleLoginBtn">
                <i class="fa-brands fa-google"></i>
            </div>
            <div class="social-btn">
                <i class="fa-brands fa-facebook-f"></i>
            </div>
        </div>

        <div class="signup-text">
            <span id="toggleAuthText">Don't have an account? Sign up</span>
        </div>

        <div id="authError" class="hidden"></div>
    </div>

    <script type="module" src="js/auth.js"></script>
    <script>
    if ('serviceWorker' in navigator) {
      window.addEventListener('load', () => {
        navigator.serviceWorker.register('firebase-messaging-sw.js').catch(console.error);
      });
    }
    </script>
</body>
</html>
