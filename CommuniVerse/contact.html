<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CommuniVerse | Contact Us</title>
    <link rel="stylesheet" href="css/style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body>
    <div class="app-container">
        <div class="header">
            <button class="btn-icon" onclick="history.back()"><i class="fa-solid fa-arrow-left"></i></button>
            <h2 class="gradient-text" style="flex: 1; text-align: center;">Contact Us</h2>
        </div>

        <div style="padding: 24px;">
            <div class="glass-panel" style="padding: 30px; text-align: center; margin-bottom: 30px;">
                <i class="fa-solid fa-comments" style="font-size: 50px; color: var(--primary-color); margin-bottom: 20px;"></i>
                <h3 style="margin: 0; font-size: 20px;">We’re here to help you.</h3>
                <p style="color: var(--text-secondary); margin-top: 10px;">Feel free to reach out to us for support, feedback, or business inquiries.</p>
            </div>

            <div style="display: flex; flex-direction: column; gap: 20px;">
                <div class="glass-panel" style="padding: 20px; display: flex; align-items: center; gap: 20px;">
                    <div style="width: 50px; height: 50px; border-radius: 50%; background: rgba(139, 92, 246, 0.1); display: flex; align-items: center; justify-content: center;">
                        <i class="fa-solid fa-envelope" style="font-size: 24px; color: var(--primary-color);"></i>
                    </div>
                    <div>
                        <div style="font-size: 14px; color: var(--text-secondary);">Email</div>
                        <a href="mailto:official.vani.xai76@gmail.com" style="font-weight: 600; color: var(--text-primary); text-decoration: none;">official.vani.xai76@gmail.com</a>
                    </div>
                </div>

                <div class="glass-panel" style="padding: 20px; display: flex; align-items: center; gap: 20px; cursor: pointer;" onclick="window.open('https://www.instagram.com/ask.team_vani', '_blank')">
                    <div style="width: 50px; height: 50px; border-radius: 50%; background: rgba(236, 72, 153, 0.1); display: flex; align-items: center; justify-content: center;">
                        <i class="fa-brands fa-instagram" style="font-size: 24px; color: #ec4899;"></i>
                    </div>
                    <div>
                        <div style="font-size: 14px; color: var(--text-secondary);">Instagram</div>
                        <div style="font-weight: 600; color: var(--text-primary);">@ask.team_vani</div>
                    </div>
                </div>

                <div class="glass-panel" style="padding: 20px; display: flex; align-items: center; gap: 20px;">
                    <div style="width: 50px; height: 50px; border-radius: 50%; background: rgba(16, 185, 129, 0.1); display: flex; align-items: center; justify-content: center;">
                        <i class="fa-solid fa-clock" style="font-size: 24px; color: #10b981;"></i>
                    </div>
                    <div>
                        <div style="font-size: 14px; color: var(--text-secondary);">Working Hours</div>
                        <div style="font-weight: 600; color: var(--text-primary);">09:00 AM – 10:00 PM</div>
                    </div>
                </div>

                <div class="glass-panel" style="padding: 20px; display: flex; align-items: center; gap: 20px;">
                    <div style="width: 50px; height: 50px; border-radius: 50%; background: rgba(59, 130, 246, 0.1); display: flex; align-items: center; justify-content: center;">
                        <i class="fa-solid fa-calendar-days" style="font-size: 24px; color: #3b82f6;"></i>
                    </div>
                    <div>
                        <div style="font-size: 14px; color: var(--text-secondary);">Working Days</div>
                        <div style="font-weight: 600; color: var(--text-primary);">Monday – Saturday</div>
                    </div>
                </div>
            </div>
        </div>
    </div>
</body>
</html>
