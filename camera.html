<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>CommuniVerse | Camera</title>
  <link rel="manifest" href="manifest.json">
  <meta name="theme-color" content="#000000">
  <link rel="apple-touch-icon" href="images/icon.png">
  <link rel="stylesheet" href="css/style.css">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
  <style>
    body { background: #000; margin: 0; overflow: hidden; display: block; }
    .camera-container { position: relative; width: 100vw; height: 100vh; height: 100dvh; background: #000; overflow: hidden; }
    .camera-view { width: 100%; height: 100%; object-fit: cover; }
    .camera-overlay { position: absolute; top: 0; left: 0; width: 100%; height: 100%; display: flex; flex-direction: column; justify-content: space-between; padding: 20px; pointer-events: none; }
    .camera-header { display: flex; justify-content: space-between; align-items: center; pointer-events: auto; }
    .camera-btn { background: rgba(0,0,0,0.5); color: white; border: none; width: 40px; height: 40px; border-radius: 50%; font-size: 20px; cursor: pointer; display: flex; align-items: center; justify-content: center; backdrop-filter: blur(5px); }
    
    .camera-controls { display: flex; justify-content: center; align-items: center; pointer-events: auto; gap: 40px; padding-bottom: 20px; }
    .capture-btn { width: 80px; height: 80px; border-radius: 50%; border: 6px solid rgba(255,255,255,0.5); background: white; cursor: pointer; transition: transform 0.2s; }
    .capture-btn:active { transform: scale(0.9); }
    
    .filters-container { display: flex; gap: 10px; overflow-x: auto; padding: 10px; position: absolute; bottom: 120px; width: 100%; pointer-events: auto; }
    .filters-container::-webkit-scrollbar { height: 0px; }
    .filter-btn { padding: 8px 16px; border-radius: 20px; background: rgba(0,0,0,0.6); color: white; border: 1px solid rgba(255,255,255,0.3); font-weight: 500; cursor: pointer; white-space: nowrap; backdrop-filter: blur(5px); }
    
    .preview-actions { display: none; padding: 20px; pointer-events: auto; gap: 10px; width: 100%; }
    .btn-action { flex: 1; padding: 16px; border-radius: 20px; font-weight: 600; font-size: 16px; border: none; cursor: pointer; color: white; }
    .btn-send { background: linear-gradient(90deg, var(--primary-color), var(--secondary-color)); }
    .btn-story { background: rgba(255,255,255,0.2); backdrop-filter: blur(10px); }
  </style>
</head>
<body>
  <div class="camera-container">
    <video id="videoElement" class="camera-view" autoplay playsinline></video>
    <img id="photoPreview" class="camera-view hidden" style="position: absolute; top:0; left:0;">
    
    <div class="camera-overlay">
      <div class="camera-header">
        <button class="camera-btn" onclick="window.history.back()"><i class="fa-solid fa-xmark"></i></button>
        <button class="camera-btn" id="switchCameraBtn"><i class="fa-solid fa-camera-rotate"></i></button>
      </div>
      
      <div class="filters-container" id="filtersList">
        <div class="filter-btn" data-filter="none">Normal</div>
        <div class="filter-btn" data-filter="grayscale(100%)">B&W</div>
        <div class="filter-btn" data-filter="sepia(100%)">Retro</div>
        <div class="filter-btn" data-filter="hue-rotate(90deg)">Trippy</div>
        <div class="filter-btn" data-filter="invert(100%)">Invert</div>
      </div>
      
      <div class="camera-controls" id="cameraControls">
        <div class="capture-btn" id="captureBtn"></div>
      </div>
      
      <div class="preview-actions" id="previewActions">
        <button class="btn-action btn-story" id="addToStoryBtn"><i class="fa-solid fa-plus"></i> Story</button>
        <button class="btn-action btn-send" id="downloadBtn"><i class="fa-solid fa-download"></i> Save</button>
      </div>
    </div>
  </div>

  <canvas id="canvas" hidden></canvas>
  <script type="module" src="js/camera.js"></script>
  <script>
    if ('serviceWorker' in navigator) {
      window.addEventListener('load', () => {
        navigator.serviceWorker.register('firebase-messaging-sw.js').catch(console.error);
      });
    }
  </script>
</body>
</html>
